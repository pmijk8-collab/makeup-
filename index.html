<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hair Eraser Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 10px;
            min-height: 100vh;
        }
        .app {
            max-width: 500px;
            margin: 0 auto;
            background: #0f0f0f;
            border-radius: 28px;
            padding: 16px;
        }
        .mode-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mode {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 30px;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .mode.active {
            background: #2a2a2a;
            color: #fff;
        }
        .upload {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            padding: 35px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .upload span {
            font-size: 44px;
            display: block;
            margin-bottom: 6px;
        }
        .upload p {
            color: #888;
            font-size: 13px;
        }
        .upload small {
            color: #555;
            font-size: 11px;
        }
        .canvas-area {
            background: #000;
            border-radius: 20px;
            margin-bottom: 16px;
            display: none;
            overflow: auto;
            max-height: 60vh;
            text-align: center;
        }
        canvas {
            width: 100%;
            border-radius: 16px;
            cursor: crosshair;
        }
        .actions {
            display: none;
            gap: 10px;
            margin-bottom: 16px;
        }
        .actions button {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .actions button:active {
            background: #2a2a2a;
        }
        .brush-area {
            background: #111;
            padding: 12px 16px;
            border-radius: 40px;
            display: none;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .brush-area label {
            color: #888;
            font-size: 12px;
        }
        input {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 2px;
        }
        input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }
        .info {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            font-size: 11px;
            color: #777;
        }
        .zoom-bar {
            display: none;
            gap: 10px;
            margin-bottom: 16px;
        }
        .zoom-bar button {
            flex: 1;
            padding: 8px;
            background: #1a1a1a;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }
        .show {
            display: flex;
        }
        .block {
            display: block;
        }
        .hide {
            display: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="mode-bar">
        <div class="mode active" id="photoMode">📷 PHOTO</div>
        <div class="mode" id="videoMode">🎥 VIDEO</div>
    </div>

    <div class="upload" id="uploadBtn">
        <span>📸</span>
        <p>Select Media</p>
        <small>JPG, PNG, WEBP, GIF, MP4, MOV, AVI, WebM</small>
    </div>

    <div class="canvas-area" id="canvasArea">
        <canvas id="canvas"></canvas>
    </div>

    <div class="zoom-bar" id="zoomBar">
        <button id="zoomOut">🔍 Zoom Out</button>
        <button id="zoomReset">⟳ Reset</button>
        <button id="zoomIn">🔍 Zoom In</button>
    </div>

    <div class="actions" id="actions">
        <button id="undoBtn">↩ UNDO</button>
        <button id="saveBtn">💾 SAVE</button>
        <button id="clearBtn">🗑 CLEAR</button>
    </div>

    <div class="brush-area" id="brushArea">
        <label>🖌️ BRUSH</label>
        <input type="range" id="brushRange" min="10" max="70" value="30">
        <span id="brushVal" style="color:#fff;">30px</span>
    </div>

    <div class="info" id="info">
        💡 Select any photo or video
    </div>
</div>

<input type="file" id="fileInput" accept="image/*,video/*" style="display:none">

<script>
    // DOM Elements
    const photoMode = document.getElementById('photoMode');
    const videoMode = document.getElementById('videoMode');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const canvasArea = document.getElementById('canvasArea');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const actions = document.getElementById('actions');
    const brushArea = document.getElementById('brushArea');
    const zoomBar = document.getElementById('zoomBar');
    const undoBtn = document.getElementById('undoBtn');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const brushRange = document.getElementById('brushRange');
    const brushVal = document.getElementById('brushVal');
    const info = document.getElementById('info');
    const zoomOut = document.getElementById('zoomOut');
    const zoomReset = document.getElementById('zoomReset');
    const zoomIn = document.getElementById('zoomIn');

    // State
    let mode = 'photo';
    let history = [];
    let drawing = false;
    let lastX = 0, lastY = 0;
    let brushSize = 30;
    let imgW = 0, imgH = 0;
    let video = null;
    let animationId = null;
    
    // Zoom state
    let zoom = 1;
    let offsetX = 0, offsetY = 0;
    let isPanning = false;
    let panStartX = 0, panStartY = 0;

    // Brush size
    brushRange.oninput = function() {
        brushSize = parseInt(this.value);
        brushVal.innerText = brushSize + 'px';
    };

    // Zoom functions
    function applyZoom() {
        canvas.style.transform = `scale(${zoom}) translate(${offsetX/zoom}px, ${offsetY/zoom}px)`;
        canvas.style.transformOrigin = 'center center';
    }

    zoomIn.onclick = () => {
        zoom = Math.min(zoom + 0.2, 3);
        applyZoom();
    };
    zoomOut.onclick = () => {
        zoom = Math.max(zoom - 0.2, 0.5);
        applyZoom();
    };
    zoomReset.onclick = () => {
        zoom = 1;
        offsetX = 0;
        offsetY = 0;
        applyZoom();
    };

    // Pan functionality
    canvas.onmousedown = (e) => {
        if (e.button === 1 || e.shiftKey) {
            isPanning = true;
            panStartX = e.clientX - offsetX;
            panStartY = e.clientY - offsetY;
            canvas.style.cursor = 'grabbing';
            e.preventDefault();
        }
    };
    window.onmousemove = (e) => {
        if (isPanning) {
            offsetX = e.clientX - panStartX;
            offsetY = e.clientY - panStartY;
            applyZoom();
        }
    };
    window.onmouseup = () => {
        isPanning = false;
        canvas.style.cursor = 'crosshair';
    };

    // Mode switch
    photoMode.onclick = () => {
        mode = 'photo';
        photoMode.classList.add('active');
        videoMode.classList.remove('active');
        if (video) stopVideo();
        resetAll();
        uploadBtn.querySelector('p').innerText = 'Select Photo';
        uploadBtn.querySelector('small').innerText = 'JPG, PNG, WEBP, GIF';
        fileInput.accept = 'image/*';
        info.innerText = '💡 Select a photo (JPG, PNG, WEBP, GIF)';
        zoomBar.style.display = 'none';
    };

    videoMode.onclick = () => {
        mode = 'video';
        videoMode.classList.add('active');
        photoMode.classList.remove('active');
        if (video) stopVideo();
        resetAll();
        uploadBtn.querySelector('p').innerText = 'Select Video';
        uploadBtn.querySelector('small').innerText = 'MP4, MOV, AVI, WebM, 3GP';
        fileInput.accept = 'video/*';
        info.innerText = '💡 Select a video (MP4, MOV, WebM)';
        zoomBar.style.display = 'flex';
    };

    function stopVideo() {
        if (animationId) cancelAnimationFrame(animationId);
        if (video) {
            video.pause();
            video = null;
        }
    }

    function resetAll() {
        canvasArea.style.display = 'none';
        actions.style.display = 'none';
        brushArea.style.display = 'none';
        uploadBtn.style.display = 'block';
        history = [];
        imgW = 0;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        fileInput.value = '';
        if (video) stopVideo();
        zoom = 1;
        offsetX = 0;
        offsetY = 0;
        applyZoom();
    }

    uploadBtn.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const fileType = file.type;
        if (fileType.startsWith('image/')) {
            loadPhoto(file);
        } else if (fileType.startsWith('video/')) {
            loadVideo(file);
        } else {
            info.innerText = '❌ Unsupported file type. Select image or video.';
        }
    };

    function loadPhoto(file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                let nw = img.width, nh = img.height;
                const maxDim = 500;
                
                if (nw > maxDim) {
                    nh = (nh * maxDim) / nw;
                    nw = maxDim;
                }
                if (nh > maxDim) {
                    nw = (nw * maxDim) / nh;
                    nh = maxDim;
                }
                
                canvas.width = nw;
                canvas.height = nh;
                canvas.style.width = nw + 'px';
                canvas.style.height = nh + 'px';
                imgW = nw;
                imgH = nh;
                
                ctx.drawImage(img, 0, 0, nw, nh);
                showUI();
                saveState();
                info.innerText = '✅ Ready! Draw on hair to remove';
                info.style.background = 'rgba(16,185,129,0.1)';
                info.style.color = '#10b981';
            };
            img.onerror = () => {
                info.innerText = '❌ Error loading image. Try another file.';
            };
            img.src = ev.target.result;
        };
        reader.onerror = () => {
            info.innerText = '❌ Error reading file. Try again.';
        };
        reader.readAsDataURL(file);
    }

    function loadVideo(file) {
        const url = URL.createObjectURL(file);
        video = document.createElement('video');
        video.src = url;
        video.muted = true;
        video.loop = false;
        video.playsInline = true;
        
        video.onloadeddata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.style.width = '100%';
            canvas.style.height = 'auto';
            imgW = video.videoWidth;
            imgH = video.videoHeight;
            
            video.play();
            function drawFrame() {
                if (!video || video.paused || video.ended) return;
                ctx.drawImage(video, 0, 0, imgW, imgH);
                animationId = requestAnimationFrame(drawFrame);
            }
            drawFrame();
            showUI();
            info.innerText = '🎬 Video playing! Draw on hair to remove (video pauses)';
            info.style.background = 'rgba(168,85,247,0.1)';
            info.style.color = '#a855f7';
        };
        video.onerror = () => {
            info.innerText = '❌ Error loading video. Try MP4 or WebM format.';
            URL.revokeObjectURL(url);
        };
        video.load();
    }

    function showUI() {
        canvasArea.style.display = 'block';
        actions.style.display = 'flex';
        brushArea.style.display = 'flex';
        uploadBtn.style.display = 'none';
    }

    function saveState() {
        const data = canvas.toDataURL('image/png');
        history.push(data);
        if (history.length > 20) history.shift();
    }

    function undo() {
        if (history.length > 1) {
            history.pop();
            const last = history[history.length - 1];
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, imgW, imgH);
                info.innerText = '↩ Undo';
            };
            img.src = last;
        } else {
            info.innerText = '⚠️ Nothing to undo';
        }
    }

    // Erase hair function
    function eraseAt(x, y, r) {
        const imgData = ctx.getImageData(0, 0, imgW, imgH);
        const data = imgData.data;
        const cx = Math.floor(x);
        const cy = Math.floor(y);
        const rad = Math.floor(r);

        // Sample skin color from surrounding
        let skinR = 210, skinG = 175, skinB = 145;
        const angles = [0, 45, 90, 135, 180, 225, 270, 315];
        
        for (let ang of angles) {
            const radAng = ang * Math.PI / 180;
            const sx = cx + Math.cos(radAng) * rad * 1.3;
            const sy = cy + Math.sin(radAng) * rad * 1.3;
            const ix = Math.floor(sx), iy = Math.floor(sy);
            if (ix >= 0 && ix < imgW && iy >= 0 && iy < imgH) {
                const idx = (iy * imgW + ix) * 4;
                const bright = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                if (bright > 80 && bright < 230) {
                    skinR = (skinR + data[idx]) / 2;
                    skinG = (skinG + data[idx+1]) / 2;
                    skinB = (skinB + data[idx+2]) / 2;
                }
            }
        }

        // Erase dark pixels (hair)
        for (let dy = -rad; dy <= rad; dy++) {
            for (let dx = -rad; dx <= rad; dx++) {
                const dist = Math.hypot(dx, dy);
                if (dist <= rad) {
                    const nx = cx + dx, ny = cy + dy;
                    if (nx >= 0 && nx < imgW && ny >= 0 && ny < imgH) {
                        const idx = (ny * imgW + nx) * 4;
                        const bright = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                        
                        // Detect hair (dark pixels)
                        if (bright < 115) {
                            const strength = 1 - (dist / rad);
                            data[idx] = data[idx] * (1 - strength * 0.85) + skinR * strength * 0.85;
                            data[idx+1] = data[idx+1] * (1 - strength * 0.85) + skinG * strength * 0.85;
                            data[idx+2] = data[idx+2] * (1 - strength * 0.85) + skinB * strength * 0.85;
                        }
                    }
                }
            }
        }
        
        ctx.putImageData(imgData, 0, 0);

        // Pause video when drawing
        if (mode === 'video' && video && !video.paused) {
            video.pause();
            if (animationId) cancelAnimationFrame(animationId);
            info.innerText = '⏸ Paused. Draw to remove hair. Tap canvas to resume.';
        }
    }

    function resumeVideo() {
        if (mode === 'video' && video && video.paused && video.src) {
            video.play();
            function drawFrame() {
                if (!video || video.paused || video.ended) return;
                ctx.drawImage(video, 0, 0, imgW, imgH);
                animationId = requestAnimationFrame(drawFrame);
            }
            drawFrame();
            info.innerText = '▶️ Playing. Draw on hair to remove.';
        }
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = imgW / rect.width;
        const scaleY = imgH / rect.height;
        
        let cx, cy;
        if (e.touches) {
            cx = e.touches[0].clientX;
            cy = e.touches[0].clientY;
        } else {
            cx = e.clientX;
            cy = e.clientY;
        }
        
        let x = (cx - rect.left) * scaleX;
        let y = (cy - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), imgW);
        y = Math.min(Math.max(0, y), imgH);
        
        return { x, y };
    }

    function startDraw(e) {
        e.preventDefault();
        if (!imgW) return;
        drawing = true;
        const pos = getPos(e);
        lastX = pos.x;
        lastY = pos.y;
        saveState();
        eraseAt(lastX, lastY, brushSize);
    }

    function doDraw(e) {
        if (!drawing) return;
        e.preventDefault();
        const pos = getPos(e);
        
        const dist = Math.hypot(pos.x - lastX, pos.y - lastY);
        if (dist > 2) {
            const steps = Math.min(6, Math.ceil(dist / 3));
            for (let i = 1; i <= steps; i++) {
                const t = i / steps;
                eraseAt(lastX + (pos.x - lastX) * t, lastY + (pos.y - lastY) * t, brushSize);
            }
            lastX = pos.x;
            lastY = pos.y;
        } else {
            eraseAt(pos.x, pos.y, brushSize);
        }
    }

    function endDraw() { 
        drawing = false; 
    }

    // Events
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', doDraw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', doDraw, { passive: false });
    canvas.addEventListener('touchend', endDraw);
    canvas.addEventListener('touchcancel', endDraw);
    canvas.addEventListener('dblclick', resumeVideo);

    // Buttons
    undoBtn.onclick = undo;
    
    saveBtn.onclick = () => {
        if (imgW > 0) {
            const link = document.createElement('a');
            link.download = 'hair_removed.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            info.innerText = '💾 Saved!';
        }
    };
    
    clearBtn.onclick = resetAll;
</script>
</body>
</html>
