<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bald Hair Eraser - Clean Skin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 10px;
            min-height: 100vh;
        }
        .app {
            max-width: 500px;
            margin: 0 auto;
            background: #0f0f0f;
            border-radius: 28px;
            padding: 16px;
        }
        .mode-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mode {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 30px;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .mode.active {
            background: #2a2a2a;
            color: #fff;
        }
        .upload {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            padding: 35px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .upload span {
            font-size: 44px;
            display: block;
            margin-bottom: 6px;
        }
        .upload p {
            color: #888;
            font-size: 13px;
        }
        .upload small {
            color: #555;
            font-size: 11px;
        }
        .canvas-area {
            background: #000;
            border-radius: 20px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }
        canvas {
            width: 100%;
            border-radius: 16px;
            cursor: crosshair;
        }
        .actions {
            display: none;
            gap: 10px;
            margin-bottom: 16px;
        }
        .actions button {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .actions button:active {
            background: #2a2a2a;
        }
        .brush-area {
            background: #111;
            padding: 12px 16px;
            border-radius: 40px;
            display: none;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .brush-area label {
            color: #888;
            font-size: 12px;
        }
        input {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 2px;
        }
        input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }
        .info {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            font-size: 11px;
            color: #777;
        }
        .strength-area {
            background: #111;
            padding: 12px 16px;
            border-radius: 40px;
            display: none;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .strength-area label {
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="mode-bar">
        <div class="mode active" id="photoMode">📷 PHOTO</div>
        <div class="mode" id="videoMode">🎥 VIDEO</div>
    </div>

    <div class="upload" id="uploadBtn">
        <span>📸</span>
        <p>Select Media</p>
        <small>JPG, PNG, WEBP, MP4, MOV</small>
    </div>

    <div class="canvas-area" id="canvasArea">
        <canvas id="canvas"></canvas>
    </div>

    <div class="actions" id="actions">
        <button id="undoBtn">↩ UNDO</button>
        <button id="saveBtn">💾 SAVE</button>
        <button id="clearBtn">🗑 CLEAR</button>
    </div>

    <div class="brush-area" id="brushArea">
        <label>🖌️ BRUSH SIZE</label>
        <input type="range" id="brushRange" min="15" max="80" value="35">
        <span id="brushVal" style="color:#fff;">35px</span>
    </div>

    <div class="strength-area" id="strengthArea">
        <label>💪 ERASE STRENGTH</label>
        <input type="range" id="strengthRange" min="50" max="100" value="95">
        <span id="strengthVal" style="color:#fff;">95%</span>
    </div>

    <div class="info" id="info">
        💡 Select photo or video
    </div>
</div>

<input type="file" id="fileInput" accept="image/*,video/*" style="display:none">

<script>
    // DOM Elements
    const photoMode = document.getElementById('photoMode');
    const videoMode = document.getElementById('videoMode');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const canvasArea = document.getElementById('canvasArea');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const actions = document.getElementById('actions');
    const brushArea = document.getElementById('brushArea');
    const strengthArea = document.getElementById('strengthArea');
    const undoBtn = document.getElementById('undoBtn');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const brushRange = document.getElementById('brushRange');
    const brushVal = document.getElementById('brushVal');
    const strengthRange = document.getElementById('strengthRange');
    const strengthVal = document.getElementById('strengthVal');
    const info = document.getElementById('info');

    // State
    let mode = 'photo';
    let history = [];
    let drawing = false;
    let lastX = 0, lastY = 0;
    let brushSize = 35;
    let eraseStrength = 0.95;
    let imgW = 0, imgH = 0;
    let video = null;
    let animationId = null;

    // Brush size
    brushRange.oninput = function() {
        brushSize = parseInt(this.value);
        brushVal.innerText = brushSize + 'px';
    };

    // Erase strength
    strengthRange.oninput = function() {
        eraseStrength = parseInt(this.value) / 100;
        strengthVal.innerText = this.value + '%';
    };

    // Mode switch
    photoMode.onclick = () => {
        mode = 'photo';
        photoMode.classList.add('active');
        videoMode.classList.remove('active');
        if (video) stopVideo();
        resetAll();
        uploadBtn.querySelector('p').innerText = 'Select Photo';
        uploadBtn.querySelector('small').innerText = 'JPG, PNG, WEBP';
        fileInput.accept = 'image/*';
        info.innerText = '💡 Select a photo';
    };

    videoMode.onclick = () => {
        mode = 'video';
        videoMode.classList.add('active');
        photoMode.classList.remove('active');
        if (video) stopVideo();
        resetAll();
        uploadBtn.querySelector('p').innerText = 'Select Video';
        uploadBtn.querySelector('small').innerText = 'MP4, MOV, WebM';
        fileInput.accept = 'video/*';
        info.innerText = '💡 Select a video';
    };

    function stopVideo() {
        if (animationId) cancelAnimationFrame(animationId);
        if (video) {
            video.pause();
            video = null;
        }
    }

    function resetAll() {
        canvasArea.style.display = 'none';
        actions.style.display = 'none';
        brushArea.style.display = 'none';
        strengthArea.style.display = 'none';
        uploadBtn.style.display = 'block';
        history = [];
        imgW = 0;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        fileInput.value = '';
        if (video) stopVideo();
    }

    uploadBtn.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        if (file.type.startsWith('image/')) {
            loadPhoto(file);
        } else if (file.type.startsWith('video/')) {
            loadVideo(file);
        }
    };

    function loadPhoto(file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                let nw = img.width, nh = img.height;
                const maxDim = 500;
                
                if (nw > maxDim) {
                    nh = (nh * maxDim) / nw;
                    nw = maxDim;
                }
                if (nh > maxDim) {
                    nw = (nw * maxDim) / nh;
                    nh = maxDim;
                }
                
                canvas.width = nw;
                canvas.height = nh;
                imgW = nw;
                imgH = nh;
                
                ctx.drawImage(img, 0, 0, nw, nh);
                showUI();
                saveState();
                info.innerText = '✅ Ready! Draw on hair - will become clean skin';
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    function loadVideo(file) {
        const url = URL.createObjectURL(file);
        video = document.createElement('video');
        video.src = url;
        video.muted = true;
        video.loop = false;
        video.playsInline = true;
        
        video.onloadeddata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            imgW = video.videoWidth;
            imgH = video.videoHeight;
            
            video.play();
            function drawFrame() {
                if (!video || video.paused || video.ended) return;
                ctx.drawImage(video, 0, 0, imgW, imgH);
                animationId = requestAnimationFrame(drawFrame);
            }
            drawFrame();
            showUI();
            info.innerText = '🎬 Video playing! Draw on hair';
        };
        video.load();
    }

    function showUI() {
        canvasArea.style.display = 'block';
        actions.style.display = 'flex';
        brushArea.style.display = 'flex';
        strengthArea.style.display = 'flex';
        uploadBtn.style.display = 'none';
    }

    function saveState() {
        const data = canvas.toDataURL('image/png');
        history.push(data);
        if (history.length > 20) history.shift();
    }

    function undo() {
        if (history.length > 1) {
            history.pop();
            const last = history[history.length - 1];
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, imgW, imgH);
                info.innerText = '↩ Undo';
            };
            img.src = last;
        } else {
            info.innerText = '⚠️ Nothing to undo';
        }
    }

    // STRONG ERASE - makes it bald/clean skin
    function strongEraseAt(x, y, r) {
        const imgData = ctx.getImageData(0, 0, imgW, imgH);
        const data = imgData.data;
        const cx = Math.floor(x);
        const cy = Math.floor(y);
        const rad = Math.floor(r);

        // Sample skin color from surrounding area (clean skin tone)
        let skinR = 0, skinG = 0, skinB = 0;
        let skinCount = 0;
        
        const angles = [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330];
        for (let ang of angles) {
            const radAng = ang * Math.PI / 180;
            const sx = cx + Math.cos(radAng) * rad * 1.5;
            const sy = cy + Math.sin(radAng) * rad * 1.5;
            const ix = Math.floor(sx), iy = Math.floor(sy);
            if (ix >= 0 && ix < imgW && iy >= 0 && iy < imgH) {
                const idx = (iy * imgW + ix) * 4;
                const bright = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                // Take brighter pixels as skin reference
                if (bright > 100 && bright < 250) {
                    skinR += data[idx];
                    skinG += data[idx+1];
                    skinB += data[idx+2];
                    skinCount++;
                }
            }
        }
        
        if (skinCount > 0) {
            skinR = skinR / skinCount;
            skinG = skinG / skinCount;
            skinB = skinB / skinCount;
        } else {
            // Default skin tone
            skinR = 215;
            skinG = 175;
            skinB = 145;
        }

        // Apply strong erase - completely replace hair pixels with skin
        for (let dy = -rad; dy <= rad; dy++) {
            for (let dx = -rad; dx <= rad; dx++) {
                const dist = Math.hypot(dx, dy);
                if (dist <= rad) {
                    const nx = cx + dx, ny = cy + dy;
                    if (nx >= 0 && nx < imgW && ny >= 0 && ny < imgH) {
                        const idx = (ny * imgW + nx) * 4;
                        const bright = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                        
                        // Detect hair (dark pixels)
                        const isHair = bright < 130;
                        
                        if (isHair) {
                            const strength = eraseStrength * (1 - (dist / rad));
                            // Completely replace with skin color
                            data[idx] = data[idx] * (1 - strength) + skinR * strength;
                            data[idx+1] = data[idx+1] * (1 - strength) + skinG * strength;
                            data[idx+2] = data[idx+2] * (1 - strength) + skinB * strength;
                            
                            // Additional pass for stubborn hair (make it even brighter)
                            if (strength > 0.7) {
                                data[idx] = data[idx] * 0.3 + skinR * 0.7;
                                data[idx+1] = data[idx+1] * 0.3 + skinG * 0.7;
                                data[idx+2] = data[idx+2] * 0.3 + skinB * 0.7;
                            }
                        }
                    }
                }
            }
        }
        
        ctx.putImageData(imgData, 0, 0);

        // Pause video when drawing
        if (mode === 'video' && video && !video.paused) {
            video.pause();
            if (animationId) cancelAnimationFrame(animationId);
            info.innerText = '⏸ Paused. Draw to remove hair. Double tap to resume.';
        }
    }

    function resumeVideo() {
        if (mode === 'video' && video && video.paused && video.src) {
            video.play();
            function drawFrame() {
                if (!video || video.paused || video.ended) return;
                ctx.drawImage(video, 0, 0, imgW, imgH);
                animationId = requestAnimationFrame(drawFrame);
            }
            drawFrame();
            info.innerText = '▶️ Playing. Draw on hair to remove.';
        }
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = imgW / rect.width;
        const scaleY = imgH / rect.height;
        
        let cx, cy;
        if (e.touches) {
            cx = e.touches[0].clientX;
            cy = e.touches[0].clientY;
        } else {
            cx = e.clientX;
            cy = e.clientY;
        }
        
        let x = (cx - rect.left) * scaleX;
        let y = (cy - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), imgW);
        y = Math.min(Math.max(0, y), imgH);
        
        return { x, y };
    }

    function startDraw(e) {
        e.preventDefault();
        if (!imgW) return;
        drawing = true;
        const pos = getPos(e);
        lastX = pos.x;
        lastY = pos.y;
        saveState();
        strongEraseAt(lastX, lastY, brushSize);
    }

    function doDraw(e) {
        if (!drawing) return;
        e.preventDefault();
        const pos = getPos(e);
        
        const dist = Math.hypot(pos.x - lastX, pos.y - lastY);
        if (dist > 2) {
            const steps = Math.min(8, Math.ceil(dist / 2));
            for (let i = 1; i <= steps; i++) {
                const t = i / steps;
                const ix = lastX + (pos.x - lastX) * t;
                const iy = lastY + (pos.y - lastY) * t;
                strongEraseAt(ix, iy, brushSize);
            }
            lastX = pos.x;
            lastY = pos.y;
        } else {
            strongEraseAt(pos.x, pos.y, brushSize);
        }
    }

    function endDraw() { 
        drawing = false; 
    }

    // Events
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', doDraw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', doDraw, { passive: false });
    canvas.addEventListener('touchend', endDraw);
    canvas.addEventListener('touchcancel', endDraw);
    canvas.addEventListener('dblclick', resumeVideo);

    // Buttons
    undoBtn.onclick = undo;
    
    saveBtn.onclick = () => {
        if (imgW > 0) {
            const link = document.createElement('a');
            link.download = 'bald_hair_removed.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            info.innerText = '💾 Saved!';
        }
    };
    
    clearBtn.onclick = resetAll;
</script>
</body>
</html>
